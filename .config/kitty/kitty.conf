shell zsh
confirm_os_window_close 0

# Versteckt die normale System-Titelleiste für den "Eingebettet"-Look
hide_window_decorations yes

# Nutzt die Tab-Bar als fixierte Statuszeile oben
tab_bar_edge top
tab_bar_min_tabs 1
tab_bar_style custom

# remote control
allow_remote_control yes
listen_on unix:/tmp/mykitty

# Theme
include ~/.config/hypr/assets/kitty-colors
font_family      family="FiraCode Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
shell_integration no-title
window_margin_width 5
window_padding_width 0 5
#tab_bar_margin_width 3
tab_bar_margin_height 3 0
placement_strategy top-left
