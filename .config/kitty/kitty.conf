shell zsh
confirm_os_window_close 0

# Versteckt die normale System-Titelleiste für den "Eingebettet"-Look
hide_window_decorations yes

# Nutzt die Tab-Bar als fixierte Statuszeile oben
tab_bar_edge top
tab_bar_style separator
tab_bar_margin_width 2
tab_separator "|"
tab_bar_min_tabs 1

# Hier passiert die Magie: Das Template zeigt nur den Fenstertitel
# (den wir via .zshrc setzen)
tab_title_template "{title}"

# remote control
allow_remote_control yes
listen_on unix:/tmp/mykitty

# Farbe der Statuszeile (tmux-Style)
active_tab_foreground   #62cdff
active_tab_background   #333333
active_tab_font_style   bold
shell_integration no-title
window_padding_width 3
