##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}


####################
### WINDOW RULES ###
####################

workspace = 1, monitor:$MONITOR1
workspace = 2, monitor:$MONITOR2
workspace = 3, monitor:$MONITOR1
workspace = 4, monitor:$MONITOR2
workspace = special:magic, monitor:$MONITOR2
windowrule = match:fullscreen 1, border_size 0
windowrule = match:class $BROWSER_CLASS, monitor $MONITOR2
windowrule = match:class Horizon-client, monitor $MONITOR1, workspace 3
windowrule = match:title VDI.*, fullscreen 1
windowrule = match:class CiscoCollabHost, workspace special:magic, pseudo 1, monitor $MONITOR2
windowrule = match:class steam, workspace special:magic, pseudo 1, size 1266x706, monitor $MONITOR2
windowrule = workspace empty, match:class cs, monitor $MONITOR1
